name: Build Cross Platform Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tello_square_mission_linux
            binary_path: dist/tello_square_mission_linux
            pyinstaller_name: tello_square_mission_linux
          - os: windows-latest
            artifact_name: tello_square_mission_windows
            binary_path: dist/tello_square_mission.exe
            pyinstaller_name: tello_square_mission

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --onefile --name "${{ matrix.pyinstaller_name }}" tello_square_mission.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onefile --name "${{ matrix.pyinstaller_name }}" tello_square_mission.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
